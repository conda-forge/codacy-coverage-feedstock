schema_version: 1

context:
  name: codacy-coverage
  version: "1.3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: b94651934745c638a980ad8d67494077e60f71e19e29aad1c275b66e0a070cbc

build:
  number: 3
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps -vv
  python:
    entry_points:
      - python-codacy-coverage = codacy:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - pip
    - requests >=2.9.1

tests:
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - python-codacy-coverage --help
      - pip check

about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Python coverage reporter for Codacy
  description: |
    Credits to Ryan for creating this! Python coverage reporter for Codacy https://www.codacy.com
  homepage: https://github.com/codacy/python-codacy-coverage
  repository: https://github.com/codacy/python-codacy-coverage
  documentation: https://github.com/codacy/python-codacy-coverage

extra:
  recipe-maintainers:
    - jan-janssen
